openapi: 3.0.3
info:
  title: Feeds Server API
  version: 1.0.0
  description: Standalone Swagger/OpenAPI documentation for the Feeds main backend.
servers:
  - url: http://localhost:3000
tags:
  - name: Public Auth
  - name: Account
  - name: Profile
  - name: Feed
  - name: Posts
  - name: Reels
  - name: Channel
  - name: Connect
  - name: Chat
  - name: Notifications
  - name: Kids
  - name: Payment
  - name: Utility
components:
  securitySchemes:
    userCookieAuth:
      type: apiKey
      in: cookie
      name: uuid
    channelCookieAuth:
      type: apiKey
      in: cookie
      name: cuid
  schemas:
    GenericPayload:
      type: object
      additionalProperties: true
    ApiSuccess:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: Request completed successfully }
      additionalProperties: true
    ApiError:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: Something went wrong }
      additionalProperties: true
    SignupPayload:
      type: object
      properties:
        fullName: { type: string }
        username: { type: string }
        email: { type: string }
        phone: { type: string }
        password: { type: string }
        dob: { type: string }
        profileImageUrl: { type: string }
        bio: { type: string }
        gender: { type: string }
        acctype: { type: string }
        parentalPassword: { type: string }
        confirmParentalPassword: { type: string }
        terms: { type: boolean }
    FetchUserOverlayPayload:
      type: object
      properties:
        user_id: { type: string }
        username: { type: string }
        email: { type: string }
    AtinJobPayload:
      type: object
      additionalProperties: true
    ContactPayload:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        subject: { type: string }
        message: { type: string }
    DelAccPayload:
      type: object
      properties:
        password: { type: string }
    CreatePostPayload:
      type: object
      properties:
        postType: { type: string }
        mediaUrl: { type: string }
        caption: { type: string }
    FinalizePostPayload:
      type: object
      properties:
        profileImageUrl: { type: string }
        type: { type: string }
        caption: { type: string }
    CheckoutPayload:
      type: object
      properties:
        plan_name: { type: string }
    VerifyPaymentPayload:
      type: object
      properties:
        razorpay_payment_id: { type: string }
        razorpay_order_id: { type: string }
        razorpay_signature: { type: string }
    UpdateUserDetailsPayload:
      type: object
      additionalProperties: true
    FollowEntityPayload:
      type: object
      additionalProperties: true
    ShareFinalPostPayload:
      type: object
      additionalProperties: true
    ReportPayload:
      type: object
      additionalProperties: true
    PostLikePayload:
      type: object
      additionalProperties: true
    CommentPayload:
      type: object
      properties:
        postId: { type: string }
        text: { type: string }
        parentId: { type: string }
    ReportPostPayload:
      type: object
      additionalProperties: true
    ReportChatPayload:
      type: object
      additionalProperties: true
    CommentLikePayload:
      type: object
      additionalProperties: true
    BlockPayload:
      type: object
      additionalProperties: true
    PostActionPayload:
      type: object
      properties:
        id: { type: string }
    UpdateChannelDetailsPayload:
      type: object
      additionalProperties: true
    ChannelPostPayload:
      type: object
      additionalProperties: true
    ChannelLikePayload:
      type: object
      additionalProperties: true
    ChannelSavePayload:
      type: object
      additionalProperties: true
    ChannelCommentPayload:
      type: object
      additionalProperties: true
    FollowChannelPayload:
      type: object
      additionalProperties: true
    KidsChangePasswordPayload:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
    KidsParentalPasswordPayload:
      type: object
      properties:
        currentParentalPassword: { type: string }
        newParentalPassword: { type: string }
    KidsTimeControlPayload:
      type: object
      additionalProperties: true
    GameRewardPayload:
      type: object
      additionalProperties: true
    PostUploadPayload:
      type: object
      properties:
        title: { type: string }
        url: { type: string }
        content: { type: string }
        type: { type: string }
paths:
  /signup:
    post:
      tags: [Public Auth]
      summary: Register a user account
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignupPayload' }
      responses:
        '201':
          description: Account created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /imagKitauth:
    get:
      tags: [Utility]
      summary: Get ImageKit authentication payload
      responses:
        '200':
          description: ImageKit auth payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /fetchUserOverlay:
    post:
      tags: [Public Auth]
      summary: Fetch overlay user details
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FetchUserOverlayPayload' }
      responses:
        '200':
          description: Overlay payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /atin_job:
    post:
      tags: [Public Auth]
      summary: Alternate login flow used by the app
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AtinJobPayload' }
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /adminLogin:
    post:
      tags: [Public Auth]
      summary: Login entry point for admin dashboard access
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Admin login result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /healthCheck:
    get:
      tags: [Utility]
      summary: Health-check endpoint
      responses:
        '200':
          description: Server healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /:
    get:
      tags: [Account]
      summary: Redirect root request to login
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '302':
          description: Redirect response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /verify:
    get:
      tags: [Account]
      summary: Verify authenticated session and return actor metadata
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Session verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /login:
    get:
      tags: [Account]
      summary: Login route placeholder for authenticated flow
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Login payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /logout:
    post:
      tags: [Account]
      summary: Logout current user or channel session
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /contact:
    post:
      tags: [Account]
      summary: Submit contact/help request
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactPayload' }
      responses:
        '200':
          description: Contact request saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /payment:
    get:
      tags: [Payment]
      summary: Get payment summary or details for authenticated actor
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Payment details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
    post:
      tags: [Payment]
      summary: Create checkout order
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckoutPayload' }
      responses:
        '200':
          description: Checkout order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /checkout_razorpay:
    post:
      tags: [Payment]
      summary: Create Razorpay checkout order
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CheckoutPayload' }
      responses:
        '200':
          description: Checkout created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /verify_payment:
    post:
      tags: [Payment]
      summary: Verify completed payment
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyPaymentPayload' }
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /delacc:
    post:
      tags: [Account]
      summary: Delete authenticated account
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string }
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /home:
    get:
      tags: [Feed]
      summary: Get authenticated user feed/home data
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Feed payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /stories:
    get:
      tags: [Feed]
      summary: Get stories feed
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Stories payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /ads:
    get:
      tags: [Feed]
      summary: Get ads for main feed
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Ads payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /connect:
    get:
      tags: [Connect]
      summary: Get connect or discovery screen data
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Connect data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /connect/search:
    get:
      tags: [Connect]
      summary: Search users or channels for connect page
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /connect/follow:
    post:
      tags: [Connect]
      summary: Follow entity from unified connect module
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FollowEntityPayload' }
      responses:
        '200':
          description: Entity followed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /connect/unfollow:
    post:
      tags: [Connect]
      summary: Unfollow entity from unified connect module
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FollowEntityPayload' }
      responses:
        '200':
          description: Entity unfollowed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /follow/{username}:
    post:
      tags: [Connect]
      summary: Follow a user
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Follow result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /follow-request/accept/{username}:
    post:
      tags: [Connect]
      summary: Accept a pending follow request
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /unfollow/{username}:
    post:
      tags: [Connect]
      summary: Unfollow a user
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Unfollow result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /unrequest/{username}:
    post:
      tags: [Connect]
      summary: Cancel a pending follow request
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Request canceled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /friends:
    get:
      tags: [Connect]
      summary: Get friend list
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Friend list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /settings:
    get:
      tags: [Account]
      summary: Get settings page data
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Settings payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /profile/{username}:
    get:
      tags: [Profile]
      summary: Get public/basic post listing for a user profile
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: User profile posts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /report/{username}:
    post:
      tags: [Profile]
      summary: Report a user account
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /report_channel/{username}:
    post:
      tags: [Channel]
      summary: Report a channel account
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Channel report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /profile/getbasic/{username}:
    get:
      tags: [Profile]
      summary: Get basic profile details and access flags
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Basic profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /profile/sensitive/{username}:
    get:
      tags: [Profile]
      summary: Get sensitive profile data such as posts, saved, liked, and social lists
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Sensitive profile payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /isfriend/{username}:
    get:
      tags: [Profile]
      summary: Get relationship state between viewer and target user
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Relationship payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /edit_profile:
    get:
      tags: [Profile]
      summary: Get editable profile information
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Profile edit data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /updateUserDetails:
    post:
      tags: [Profile]
      summary: Update user profile details
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserDetailsPayload' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /togglePublicPrivate:
    get:
      tags: [Profile]
      summary: Toggle public or private visibility
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Visibility toggled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /block:
    get:
      tags: [Profile]
      summary: Get blocked users list
      security:
        - userCookieAuth: []
      responses:
        '200':
          description: Blocked users
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /block/{username}:
    post:
      tags: [Profile]
      summary: Block or unblock a user
      security:
        - userCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Block action result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /chat/{username}:
    get:
      tags: [Chat]
      summary: Get chat thread with a user
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chat thread
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
    delete:
      tags: [Chat]
      summary: Delete chat thread with a user
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chat deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /chat/{username}/seen:
    post:
      tags: [Chat]
      summary: Mark chat thread as seen
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      parameters:
        - in: path
          name: username
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Chat marked seen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /report_chat:
    post:
      tags: [Chat]
      summary: Report a chat message or thread
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportChatPayload' }
      responses:
        '200':
          description: Chat report submitted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /notifications:
    get:
      tags: [Notifications]
      summary: Get notifications summary
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Notification data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /GetAllNotifications:
    get:
      tags: [Notifications]
      summary: Get complete notifications list
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Notifications list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /notifications/mark-seen:
    post:
      tags: [Notifications]
      summary: Mark notifications as seen
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Notifications marked seen
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /unseen-counts:
    get:
      tags: [Notifications]
      summary: Get unseen notification and chat counts
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Unseen counts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /notification:
    post:
      tags: [Notifications]
      summary: Create a notification manually
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReportPayload' }
      responses:
        '200':
          description: Notification created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /create_post:
    get:
      tags: [Posts]
      summary: Get create-post data
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Create-post data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /create_post_2:
    get:
      tags: [Posts]
      summary: Get secondary create-post data
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      responses:
        '200':
          description: Secondary create-post data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /createpost:
    post:
      tags: [Posts]
      summary: Create a user post draft or entry
      security:
        - userCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePostPayload' }
      responses:
        '200':
          description: Post created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /finalSubmit:
    post:
      tags: [Posts]
      summary: Finalize a post before publish
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/FinalizePostPayload' }
      responses:
        '200':
          description: Finalization result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /shareFinalPost:
    post:
      tags: [Posts]
      summary: Upload or publish finalized post
      security:
        - userCookieAuth: []
        - channelCookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ShareFinalPostPayload' }
      responses:
        '200':
          description: Post published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiSuccess'
  /posts/like:
    post:
      tags: [Posts]
      summary: Like or unlike a standard post or reel
      security:
        - userCookieAuth: []
      requestBody:
        required: true
