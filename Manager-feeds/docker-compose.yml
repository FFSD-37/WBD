version: '3.9'

services:
  backend:
    build:
      context: ./manager-server
      dockerfile: Dockerfile
    container_name: manager-backend
    ports:
      - '4000:4000'
    environment:
      - NODE_ENV=production
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/managerdb
    depends_on:
      - mongo
    restart: unless-stopped

  frontend:
    build:
      context: ./manager-client
      dockerfile: Dockerfile
      args:
        VITE_MANAGER_API: http://localhost:4000
    container_name: manager-frontend
    ports:
      - '5174:80'
    depends_on:
      - backend
    restart: unless-stopped

  mongo:
    image: mongo:7.0
    container_name: manager-mongo
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
