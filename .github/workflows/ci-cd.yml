name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.app_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app_name: Feeds-ReactJs
            app_path: Feeds-ReactJS/server
            lockfile: Feeds-ReactJS/server/package-lock.json
          - app_name: Admin_feeds
            app_path: Admin-feeds/Feeds-admin
            lockfile: Admin-feeds/Feeds-admin/package-lock.json
          - app_name: Manager_feeds
            app_path: Manager-feeds/manager-server
            lockfile: Manager-feeds/manager-server/package-lock.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - name: Install dependencies
        working-directory: ${{ matrix.app_path }}
        run: npm ci

      - name: Run tests
        working-directory: ${{ matrix.app_path }}
        env:
          NODE_ENV: test
        run: npm test

  deploy:
    name: Deploy ${{ matrix.app_name }}
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - app_name: Feeds-ReactJs
            deploy_hook_secret: RENDER_FEEDS_DEPLOY_HOOK
          - app_name: Admin_feeds
            deploy_hook_secret: RENDER_ADMIN_DEPLOY_HOOK
          - app_name: Manager_feeds
            deploy_hook_secret: RENDER_MANAGER_DEPLOY_HOOK

    steps:
      - name: Trigger Render deploy hook
        env:
          DEPLOY_HOOK_URL: ${{ secrets[matrix.deploy_hook_secret] }}
        run: |
          if [ -z "$DEPLOY_HOOK_URL" ]; then
            echo "Missing deploy hook secret: ${{ matrix.deploy_hook_secret }}"
            exit 1
          fi

          curl -fsSL -X POST "$DEPLOY_HOOK_URL"